# memory-shepherd.conf — ODS Agent Memory Management
#
# Manages workspace files for OpenClaw agents by periodically
# resetting them to operator-controlled baselines.
# Files with a --- separator get scratch notes archived before reset.
# Files without a separator get fully backed up before overwrite.
#
# Install: ./memory-shepherd/install.sh
# Manual:  ./memory-shepherd/memory-shepherd.sh all

[general]
baseline_dir=~/ods/memory-shepherd/baselines
archive_dir=~/ods/data/memory-archives
max_memory_size=16384
archive_retention_days=30
separator=---
min_baseline_size=500

# MEMORY.md — agent's long-term memory (has scratch section below ---)
[ods-agent-memory]
memory_file=~/ods/config/openclaw/workspace/MEMORY.md
baseline=ods-agent-MEMORY.md
archive_subdir=ods-agent/memory

# AGENTS.md — workspace instructions (pure overwrite, no scratch)
[ods-agent-agents]
memory_file=~/ods/config/openclaw/workspace/AGENTS.md
baseline=ods-agent-AGENTS.md
archive_subdir=ods-agent/agents

# TOOLS.md — service map (pure overwrite, no scratch)
[ods-agent-tools]
memory_file=~/ods/config/openclaw/workspace/TOOLS.md
baseline=ods-agent-TOOLS.md
archive_subdir=ods-agent/tools
