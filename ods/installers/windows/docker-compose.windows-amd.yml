# ODS -- Windows AMD Overlay
# Inference server (Lemonade or llama-server) runs natively on Windows host.
# All other services remain in Docker, reaching the host via host.docker.internal.
#
# Lemonade: OpenAI-compatible API at /api/v1 (NPU + Vulkan + ROCm)
# llama-server fallback: OpenAI-compatible API at /v1 (Vulkan only)
#
# Use with: docker compose -f docker-compose.base.yml -f installers/windows/docker-compose.windows-amd.yml up -d

services:
  llama-server:
    image: hello-world:latest   # Placeholder -- container never runs (replicas: 0)
    deploy:
      replicas: 0    # Disabled -- running natively on Windows host

  dashboard-api:
    environment:
      - OLLAMA_URL=http://host.docker.internal:8080
      - LLM_BACKEND=${LLM_BACKEND:-lemonade}
      - LLM_API_BASE_PATH=${LLM_API_BASE_PATH:-/v1}
      - AMD_INFERENCE_RUNTIME=${AMD_INFERENCE_RUNTIME:-}
      - AMD_INFERENCE_BACKEND=${AMD_INFERENCE_BACKEND:-}
      - AMD_INFERENCE_LOCATION=${AMD_INFERENCE_LOCATION:-host}
      - AMD_INFERENCE_PORT=${AMD_INFERENCE_PORT:-8080}
      - AMD_INFERENCE_SUPPORTED_BACKENDS=${AMD_INFERENCE_SUPPORTED_BACKENDS:-}
      - AMD_INFERENCE_RUNTIME_MODE=${AMD_INFERENCE_RUNTIME_MODE:-unknown}
      - AMD_INFERENCE_MANAGED=${AMD_INFERENCE_MANAGED:-false}
      - ODS_TALK_HERMES_TIMEOUT=${ODS_TALK_HERMES_TIMEOUT:-900}
      # The base compose default points ODS Talk image attachments at the
      # in-network llama-server service. On Windows AMD, inference runs on the
      # host instead, so route vision calls through host.docker.internal using
      # the same API path selected by the installer.
      - ODS_TALK_VISION_URL=${ODS_TALK_VISION_URL:-http://host.docker.internal:${AMD_INFERENCE_PORT:-8080}${LLM_API_BASE_PATH:-/v1}}

  open-webui:
    environment:
      # LLM_API_BASE_PATH set by installer: /api/v1 for Lemonade, /v1 for llama-server
      OPENAI_API_BASE_URL: "http://host.docker.internal:8080${LLM_API_BASE_PATH:-/v1}"
