schema_version: ods.services.v1

service:
  id: crewai
  name: CrewAI
  aliases: [crew, crew-ai, multi-agent]
  container_name: ods-crewai
  host_env: CREWAI_HOST
  default_host: crewai
  port: 8501
  external_port_env: CREWAI_PORT
  external_port_default: 8501
  health: /
  type: docker
  gpu_backends: [all]
  category: optional
  depends_on: []
  env_vars: []
  compose_file: compose.yaml
  description: |
    CrewAI is a multi-agent framework for AI workflows. It enables autonomous
    AI agents to collaborate, delegate tasks, and work together to solve
    complex problems. Perfect for building agent teams that simulate real-world
    collaboration and decision-making.

  tags:
    - multi-agent
    - orchestration
    - automation
    - autonomous-agents
    - workflow
    - python

features:
  - id: multi-agent
    name: Multi-Agent Teams
    description: Teams of autonomous AI agents working together
    icon: Users
    category: ai
    requirements:
      services: [crewai]
      vram_gb: 0
    enabled_services_all: [crewai]
    setup_time: ~1 minute
    priority: 16
  - id: task-delegation
    name: Task Delegation
    description: Automatic task distribution between agents
    icon: GitBranch
    category: ai
    requirements:
      services: [crewai]
      vram_gb: 0
    enabled_services_all: [crewai]
    setup_time: ~1 minute
    priority: 17
  - id: sequential-process
    name: Sequential Process
    description: Step-by-step task execution with defined order
    icon: ListOrdered
    category: ai
    requirements:
      services: [crewai]
      vram_gb: 0
    enabled_services_all: [crewai]
    setup_time: ~1 minute
    priority: 18
  - id: hierarchical-process
    name: Hierarchical Process
    description: Manager-led coordination with validation
    icon: GitBranch
    category: ai
    requirements:
      services: [crewai]
      vram_gb: 0
    enabled_services_all: [crewai]
    setup_time: ~1 minute
    priority: 19
  - id: flows
    name: Event-Driven Flows
    description: Event-driven workflows for complex automations
    icon: Workflow
    category: ai
    requirements:
      services: [crewai]
      vram_gb: 0
    enabled_services_all: [crewai]
    setup_time: ~1 minute
    priority: 20
