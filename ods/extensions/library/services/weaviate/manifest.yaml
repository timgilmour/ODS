schema_version: ods.services.v1

service:
  id: weaviate
  name: Weaviate
  aliases: [weaviate-db]
  container_name: ods-weaviate
  host_env: WEAVIATE_HOST
  default_host: weaviate
  port: 8080
  external_port_env: WEAVIATE_PORT
  external_port_default: 7811
  health: /v1/.well-known/ready
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars:
    - key: WEAVIATE_API_KEY
      required: true
      secret: true
      description: "API key for Weaviate authentication (auto-generated by setup.sh)"
  setup_hook: setup.sh
  description: |
    Weaviate is an open-source vector database that stores both objects and vectors.
    Supports semantic search, hybrid search, structured filtering, and multi-tenancy.
    A cloud-native alternative to ChromaDB with gRPC support and horizontal scaling.

  tags:
    - vector-database
    - semantic-search
    - embeddings
    - open-source
    - scalable
    - local

features:
  - id: vector-search
    name: Vector Search
    description: Semantic similarity search with vector embeddings
    icon: Search
    category: data
    requirements:
      services: [weaviate]
      vram_gb: 0
    enabled_services_all: [weaviate]
    setup_time: ~1 minute
    priority: 16
  - id: hybrid-search
    name: Hybrid Search
    description: Combine vector similarity with keyword matching
    icon: Filter
    category: data
    requirements:
      services: [weaviate]
      vram_gb: 0
    enabled_services_all: [weaviate]
    setup_time: ~1 minute
    priority: 17
  - id: multi-tenancy
    name: Multi-Tenancy
    description: Isolated data spaces for different users/organizations
    icon: Users
    category: data
    requirements:
      services: [weaviate]
      vram_gb: 0
    enabled_services_all: [weaviate]
    setup_time: ~1 minute
    priority: 18
