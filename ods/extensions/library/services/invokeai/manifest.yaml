schema_version: ods.services.v1

service:
  id: invokeai
  name: InvokeAI
  aliases: [invoke, image-gen, canvas]
  container_name: ods-invokeai
  host_env: INVOKEAI_HOST
  default_host: invokeai
  port: 9090
  external_port_env: INVOKEAI_PORT
  external_port_default: 9090
  health: /health
  type: docker
  gpu_backends: [amd, nvidia]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars: []
  description: |
    InvokeAI is a leading creative engine for Stable Diffusion models. 
    Professional-grade image generation with a node-based canvas, layer support,
    and FLUX model compatibility. Best-in-class UI for serious creators.

features:
  - id: invokeai-image-generation
    name: Image Generation
    description: Professional Stable Diffusion image generation with FLUX support
    icon: Image
    category: media
    requirements:
      services: [invokeai]
      vram_gb: 8
    enabled_services_all: [invokeai]
    setup_time: ~5 minutes
    priority: 9
    gpu_backends: [amd, nvidia]
  
  - id: canvas
    name: Node Canvas
    description: Visual node-based workflow builder for complex pipelines
    icon: LayoutGrid
    category: media
    requirements:
      services: [invokeai]
      vram_gb: 8
    enabled_services_all: [invokeai]
    setup_time: ~5 minutes
    priority: 8
    gpu_backends: [amd, nvidia]

  - id: control-layers
    name: Control Layers
    description: ControlNet and Control LoRA support for precise image control
    icon: Sliders
    category: media
    requirements:
      services: [invokeai]
      vram_gb: 10
    enabled_services_all: [invokeai]
    setup_time: ~5 minutes
    priority: 7
    gpu_backends: [amd, nvidia]

tags:
  - image-generation
  - stable-diffusion
  - flux
  - canvas
  - controlnet
  - professional
  - local
  - gpu
