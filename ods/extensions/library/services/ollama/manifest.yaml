schema_version: ods.services.v1

service:
  id: ollama
  name: Ollama
  aliases: [ollama-api, ollama-backend]
  container_name: ods-ollama
  host_env: OLLAMA_HOST
  default_host: ollama
  port: 11434
  external_port_env: EXT_OLLAMA_PORT
  external_port_default: 7804
  health: /api/tags
  type: docker
  gpu_backends: [amd, nvidia]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  description: "Pull-and-run server for open-source large language models with simple model management."
  env_vars:
    - key: OLLAMA_MODEL
      required: false
      default: "llama3"
      description: Default model to load on startup

features:
  - id: ollama-llm
    name: Ollama LLM Backend
    description: Alternative LLM backend for running open-source models
    icon: Cpu
    category: ai
    requirements:
      services: [ollama]
      vram_gb: 8
    enabled_services_all: [ollama]
    setup_time: ~2 minutes
    priority: 5
    gpu_backends: [amd, nvidia]
