# SillyTavern security configuration for Docker environments.
# Host-side security is handled by compose port binding (127.0.0.1 only),
# so application-level security is redundant and breaks Docker healthchecks.
# securityOverride disables the startup security check that otherwise
# requires whitelist, basic auth, or user accounts when listening on
# non-localhost.  whitelistMode is also disabled to avoid blocking Docker
# bridge traffic (SillyTavern doesn't support CIDR notation).
securityOverride: true
whitelistMode: false
