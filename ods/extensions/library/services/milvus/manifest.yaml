schema_version: ods.services.v1

service:
  id: milvus
  name: Milvus (Vector Database)
  aliases: [milvus-db]
  container_name: ods-milvus
  host_env: MILVUS_HOST
  default_host: milvus
  port: 19530
  external_port_env: MILVUS_PORT
  external_port_default: 19530
  health: /healthz
  health_port: 9091
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: recommended
  depends_on: []
  description: "Production-grade open-source vector database for scalable similarity search."
