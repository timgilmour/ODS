schema_version: ods.services.v1

service:
  id: paperless-ngx
  name: Paperless-ngx
  aliases: [paperless, document-manager]
  container_name: ods-paperless
  host_env: PAPERLESS_HOST
  default_host: paperless
  port: 8000
  external_port_env: PAPERLESS_PORT
  external_port_default: 7807
  health: /accounts/login/
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars:
    - key: PAPERLESS_SECRET_KEY
      required: true
      secret: true
      description: "Django secret key for session security (auto-generated by setup.sh)"
  setup_hook: setup.sh
  description: |
    Paperless-ngx is a document management system that transforms your physical
    documents into a searchable online archive. OCR, tagging, automatic
    classification, and full-text search for PDFs and images.

  tags:
    - documents
    - ocr
    - archive
    - pdf
    - search
    - productivity

features:
  - id: ocr
    name: OCR
    description: Automatic OCR for scanned PDFs and images
    icon: FileText
    category: productivity
    requirements:
      services: [paperless-ngx]
      vram_gb: 0
    enabled_services_all: [paperless-ngx]
    setup_time: ~1 minute
    priority: 16
  - id: document-tags
    name: Document Tags
    description: Auto and manual tagging for organization
    icon: Tag
    category: productivity
    requirements:
      services: [paperless-ngx]
      vram_gb: 0
    enabled_services_all: [paperless-ngx]
    setup_time: ~1 minute
    priority: 17
  - id: fulltext-search
    name: Full-Text Search
    description: Search inside all your documents
    icon: Search
    category: productivity
    requirements:
      services: [paperless-ngx]
      vram_gb: 0
    enabled_services_all: [paperless-ngx]
    setup_time: ~1 minute
    priority: 18
  - id: email-import
    name: Email Import
    description: Import documents via email
    icon: Mail
    category: productivity
    requirements:
      services: [paperless-ngx]
      vram_gb: 0
    enabled_services_all: [paperless-ngx]
    setup_time: ~1 minute
    priority: 19
