services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.3.8
    container_name: ods-openclaw
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - OPENCLAW_CONFIG=/config/openclaw.json
      - OPENCLAW_DATA=/data
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_TOKEN:?Set OPENCLAW_TOKEN in .env}
      - LLM_MODEL=${LLM_MODEL:-qwen3:30b-a3b}
      - BOOTSTRAP_MODEL=${BOOTSTRAP_MODEL:-qwen3:8b-q4_K_M}
      - GGUF_FILE=${GGUF_FILE:-}
      - LEMONADE_MODEL=${LEMONADE_MODEL:-}
      - OLLAMA_URL=${LLM_API_URL:-http://llama-server:8080}
      - OPENCLAW_LLM_URL=${OPENCLAW_LLM_URL:-}
      - OPENCLAW_HTTP_API=${OPENCLAW_HTTP_API:-}
      - LITELLM_KEY=${LITELLM_KEY:-}
      - SEARXNG_BASE_URL=http://searxng:8080
      - OPENCLAW_EXTERNAL_PORT=${OPENCLAW_PORT:-7860}
      - HOST_LAN_IP=${HOST_LAN_IP:-}
      - BIND_ADDRESS=${BIND_ADDRESS:-127.0.0.1}
      - OPENCLAW_DANGEROUSLY_DISABLE_DEVICE_AUTH=${OPENCLAW_DANGEROUSLY_DISABLE_DEVICE_AUTH:-}
      - HOME=/home/node
    user: "0:0"
    # Gateway bind mode tracks BIND_ADDRESS: a loopback bind (127.0.0.1 /
    # localhost / ::1) binds the gateway to localhost so the process-level
    # binding matches the localhost intent; any widened bind exposes it on the
    # LAN interface. The unconfigured-gateway flag is dropped: inject-token.js
    # always writes the merged config to /tmp/openclaw-config.json
    # (OPENCLAW_CONFIG_PATH), so the gateway is always configured at start.
    entrypoint: ["/bin/sh", "-c", "chown -R 1000:1000 /home/node/.openclaw; exec setpriv --reuid=1000 --regid=1000 --clear-groups /bin/sh -c 'node /config/inject-token.js; export OPENCLAW_CONFIG_PATH=/tmp/openclaw-config.json; case \"$${BIND_ADDRESS:-127.0.0.1}\" in 127.0.0.1|localhost|::1) BIND_MODE=localhost ;; *) BIND_MODE=lan ;; esac; exec docker-entrypoint.sh node openclaw.mjs gateway --bind \"$$BIND_MODE\"'"]
    volumes:
      - ./config/openclaw:/config:ro,z
      - ./data/openclaw:/data:z
      - ./data/openclaw/home/agents:/home/node/.openclaw/agents:z
      - ./data/openclaw/home/canvas:/home/node/.openclaw/canvas:z
      - ./data/openclaw/home/cron:/home/node/.openclaw/cron:z
      - ./config/openclaw/workspace:/home/node/.openclaw/workspace:z
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${OPENCLAW_PORT:-7860}:18789"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "if [ \"$$OPENCLAW_HTTP_API\" = 'true' ]; then wget -qO- http://127.0.0.1:18790/v1/models || exit 1; else wget -qO- http://127.0.0.1:18789/ || exit 1; fi"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # NOTE: OpenClaw's OpenAI-compat shim (port 18790) is conditional on
  # OPENCLAW_HTTP_API=true, which is not set anywhere in our compose path
  # — so 18790 isn't listening, and an Open WebUI override that adds
  # `http://openclaw:18790/v1` to OPENAI_API_BASE_URLS produced
  # "Connection refused" against the second upstream, breaking the model
  # dropdown entirely (it would silently swallow llama-server's models
  # depending on the OWUI version's fan-out failure mode).
  #
  # Given OpenClaw is being deprecated in favor of Hermes Agent (see
  # docs/HERMES.md "OpenClaw migration"), the right move is to stop
  # routing Open WebUI through the broken shim. Users wanting the
  # OpenClaw UI directly still reach it on its host port (default 7860,
  # bound by `ports:` above).
  #
  # If we ever want to re-add OpenClaw as a WebUI backend, the fix is:
  # (a) set OPENCLAW_HTTP_API=true on the openclaw service to enable
  #     the 18790 shim, and (b) restore the upstream block below.
