schema_version: ods.services.v1

compatibility:
  ods_min: "2.0.0"

service:
  id: openclaw
  name: OpenClaw (Agents — DEPRECATED)
  aliases: []
  # Deprecated 2026-05-12. Hermes Agent is the new default agent on ODS
  # Server; OpenClaw remains installable via `--openclaw` / `ods enable
  # openclaw` until the next release, when this extension directory is
  # removed entirely. See docs/MIGRATION-OPENCLAW-TO-HERMES.md.
  deprecated: true
  deprecated_replacement: hermes
  container_name: ods-openclaw
  host_env: OPENCLAW_HOST
  default_host: openclaw
  port: 18789
  external_port_env: OPENCLAW_PORT
  external_port_default: 7860
  health: /
  ui_path: /
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: optional
  depends_on: [llama-server, searxng]
  llm:
    consumes: true
    route: direct
    pinning: none
    min_context: 65536
    probe:
      kind: custom
      path: /
      auth: env:OPENCLAW_TOKEN
  env_vars:
    - key: OPENCLAW_TOKEN
      required: true
      secret: true
      description: OpenClaw gateway token
