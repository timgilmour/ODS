server {
    listen 3001;
    listen [::]:3001;  # IPv6 support for Docker healthcheck
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker service IPs can change when lifecycle commands recreate
    # dashboard-api. Use Docker DNS at request time instead of pinning the IP
    # nginx resolved when this container started.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;
    set $dashboard_api_upstream dashboard-api:3002;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ODS Talk endpoints — chat + voice. These are inherently long-running:
    # on a cold first message, Hermes prompt processing of the 16k-token
    # system prompt can take 60+ seconds before any token streams back. The
    # SSE stream endpoint (/api/talk/message/stream) needs unbuffered passthrough
    # and a generous read timeout so the upstream can keep the connection open
    # while tokens trickle in.
    location ^~ /api/talk/ {
        proxy_pass http://$dashboard_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header Authorization "Bearer ${DASHBOARD_API_KEY}";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # SSE / streaming responses: don't buffer; flush frames immediately.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
    }

    # Proxy API requests to status backend
    # Auth: nginx injects Bearer token for same-origin requests (B2 fix)
    # Token read from environment via envsubst in entrypoint
    location /api/ {
        proxy_pass http://$dashboard_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "close";
        # B1 fix: Auth header injected by entrypoint.sh after reading key from file/env
        proxy_set_header Authorization "Bearer ${DASHBOARD_API_KEY}";
        proxy_read_timeout 180s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; media-src 'self' blob:; font-src 'self' https://cdn.jsdelivr.net;" always;
    # Pre-stage HSTS so it activates automatically when TLS lands via
    # Caddy/Tailscale. Harmless over plain HTTP (browsers ignore it).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
}
