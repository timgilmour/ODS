schema_version: ods.services.v1

compatibility:
  ods_min: "2.0.0"

service:
  id: ape
  name: APE (Agent Policy Engine)
  aliases: [policy, guard]
  container_name: ods-ape
  default_host: ape
  port: 7890
  external_port_env: APE_PORT
  external_port_default: 7890
  health: /health
  ui_path: /
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  description: >
    Lightweight policy engine that intercepts and audits agent tool calls
    before execution. Enforces configurable allow/deny rules (command
    allowlists, path guards, rate limits) and maintains a tamper-evident
    audit log of every decision. Drop-in governance layer for OpenClaw
    and any OpenAI-compatible agent framework.

features:
  - id: agent-governance
    name: Agent Governance
    description: Policy enforcement and audit logging for autonomous agents
    icon: Shield
    category: privacy
    requirements:
      services: []
    enabled_services_any: [ape]
    setup_time: Ready
    priority: 10
    launch:
      type: none
    gpu_backends: [all]
