schema_version: ods.services.v1

compatibility:
  ods_min: "2.0.0"

service:
  id: token-spy
  name: Token Spy (Usage Monitor)
  aliases: []
  container_name: ods-token-spy
  default_host: token-spy
  port: 8080
  external_port_env: TOKEN_SPY_PORT
  external_port_default: 3005
  health: /health
  ui_path: /dashboard
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: recommended
  depends_on: []
  llm:
    consumes: true
    route: direct
    pinning: none
    min_context: 0
    probe:
      kind: custom
      path: /dashboard
      auth: env:TOKEN_SPY_API_KEY
