services:
  comfyui:
    build:
      context: ./extensions/services/comfyui
      dockerfile: Dockerfile
    container_name: ods-comfyui
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${COMFYUI_PORT:-8188}:8188"
    volumes:
      - ./data/comfyui/models:/models:z
      - ./data/comfyui/output:/output:z
      - ./data/comfyui/input:/input:z
      - ./data/comfyui/workflows:/workflows:ro,z
    shm_size: '8g'
    deploy:
      resources:
        limits:
          cpus: '${COMFYUI_CPU_LIMIT:-1.0}'
          memory: 24G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:8188"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
