services:
  comfyui:
    image: ignatberesnev/comfyui-gfx1151:v0.2
    container_name: ods-comfyui
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-992}"
    security_opt:
      - no-new-privileges:true
    shm_size: 8g
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.1
      - PYTORCH_TUNABLEOP_ENABLED=1
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1
    volumes:
      - ./data/comfyui/ComfyUI:/opt/ComfyUI:z
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${COMFYUI_PORT:-8188}:8188"
    command: >-
      /bin/sh -c "/opt/comfyui-gfx1151-utils/check-comfyui.sh &&
      python3 /opt/ComfyUI/main.py --listen 0.0.0.0 --use-flash-attention"
    deploy:
      resources:
        limits:
          cpus: '${COMFYUI_CPU_LIMIT:-1.0}'
          memory: 96G
        reservations:
          cpus: '${COMFYUI_CPU_RESERVATION:-0.5}'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8188/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
