services:
  tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.2.4
    container_name: ods-tts
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - DEFAULT_VOICE=af_heart
      - UVICORN_WORKERS=2
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${TTS_PORT:-8880}:8880"
    deploy:
      resources:
        limits:
          cpus: '${TTS_CPU_LIMIT:-1.0}'
          memory: 4G
        reservations:
          cpus: '${TTS_CPU_RESERVATION:-0.5}'
          memory: 1G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8880/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
