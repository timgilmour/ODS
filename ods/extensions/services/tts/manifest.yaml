schema_version: ods.services.v1

compatibility:
  ods_min: "2.0.0"

service:
  id: tts
  name: Kokoro (TTS)
  aliases: [kokoro]
  container_name: ods-tts
  host_env: KOKORO_HOST
  default_host: tts
  port: 8880
  external_port_env: TTS_PORT
  external_port_default: 8880
  health: /health
  ui_path: /docs
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: optional
  depends_on: []
