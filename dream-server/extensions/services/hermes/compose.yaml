services:
  hermes:
    # Version-pinned upstream image. Override HERMES_AGENT_IMAGE only for
    # deliberate hotfix testing; bumping the default is a review-and-smoke-test
    # pass — see docs/HERMES.md "How to bump the image pin."
    image: ${HERMES_AGENT_IMAGE:-nousresearch/hermes-agent:v2026.5.16}
    container_name: dream-hermes
    restart: unless-stopped
    # NOT host networking — we use bridge so the container can resolve
    # `llama-server` via Docker's internal DNS. Upstream's reference compose
    # uses host mode; we deviate because Dream Server is multi-service and
    # depends on inter-container service discovery.
    environment:
      # User remapping: match the host user so files written into the volume
      # are owned by the user, not container-root. Same pattern as n8n.
      - HERMES_UID=${UID:-10000}
      - HERMES_GID=${GID:-10000}
      # Point Hermes at the local LLM. provider=custom is the documented
      # alias for any OpenAI-compatible local server (vLLM / llama.cpp / Ollama).
      # The actual provider/model wiring lives in cli-config.yaml (mounted below).
      - OPENAI_BASE_URL=${HERMES_LLM_BASE_URL:-http://llama-server:8080/v1}
      - OPENAI_API_KEY=${HERMES_LLM_API_KEY:-sk-dream-hermes-local}
      # Aggressive timeouts for local cold starts — llama-server can take
      # >60s to load a model under heavy use.
      - HERMES_API_TIMEOUT=1800
      - HERMES_API_CALL_STALE_TIMEOUT=900
      # Default terminal-tool timeout. We disable the `terminal` toolset
      # entirely via cli-config.yaml's `agent.disabled_toolsets`, but this is
      # belt-and-suspenders if a future config refactor re-enables it.
      - TERMINAL_TIMEOUT=30
      # Locale + timezone match the rest of the stack.
      - TZ=${TIMEZONE:-UTC}
      - HERMES_LANGUAGE=${HERMES_LANGUAGE:-en}
      # Optional WhatsApp adapter pass-through. These list-form entries are
      # only populated when the operator sets them in the compose environment;
      # otherwise the disabled config block in cli-config.yaml.template remains
      # authoritative and Hermes's own persisted .env is not masked by blanks.
      - WHATSAPP_ENABLED
      - WHATSAPP_MODE
      - WHATSAPP_ALLOWED_USERS
      - WHATSAPP_REQUIRE_MENTION
      - WHATSAPP_FREE_RESPONSE_CHATS
      - WHATSAPP_REPLY_PREFIX
      # Embed the dashboard inside the gateway process (see `command` below).
      # Upstream reads these env vars to configure the dashboard listener
      # without separate CLI flags.
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      # --insecure equivalent: dashboard refuses non-loopback binds without
      # this since it stores API keys. The trusted-LAN posture is the v1
      # trade-off (documented in docs/HERMES.md).
      - HERMES_DASHBOARD_INSECURE=1
      # --no-open equivalent: stops Hermes from trying to spawn a browser
      # inside the container.
      - HERMES_DASHBOARD_NO_OPEN=1
      # Point Hermes's web tools at the bundled SearXNG. Without this,
      # tools/web_tools.py:_get_backend() falls through paid backends
      # (Firecrawl / Parallel / Tavily / Exa) — all of which require API
      # keys we don't ship — and ultimately defaults to "firecrawl",
      # raising a backend-configuration error on every web_search /
      # web_extract call. SearXNG is the only backend bundled with the
      # stack and is always reachable on the dream-network, so it's the
      # right default. Users wanting Firecrawl/Tavily/etc. still set the
      # paid backend's API key and it takes priority over SEARXNG_URL.
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
      # Enable the in-browser chat tab. Hermes's chat surface is PTY-
      # backed (it runs a real REPL inside the container and pipes it
      # to the browser via WebSocket on /api/pty + /api/ws + /api/events).
      # Without HERMES_DASHBOARD_TUI=1 those endpoints stay off and
      # the React UI renders Sessions / Analytics / Models / Cron /
      # Skills / etc. but has no way to actually start a conversation.
      # Upstream defaults this off because PTY = shell access; we flip
      # it on because (a) Hermes is the agent we ship — chat is the
      # point — and (b) the surface is gated end-to-end:
      #   * hermes container is internal-only (compose `expose:`)
      #   * hermes-proxy in front does forward_auth against
      #     dashboard-api/api/auth/verify-session
      #   * a magic-link session OR admin-session bootstrap (#1222) is
      #     required before Caddy lets the request through
      - HERMES_DASHBOARD_TUI=1
    volumes:
      # Persistent state: Hermes's HERMES_HOME. Sessions, skills, memories,
      # cron jobs, audit logs all live here.
      - ./data/hermes:/opt/data:z
      # Bake our cli-config.yaml + SOUL.md as the defaults Hermes copies into
      # HERMES_HOME on first start (its entrypoint copies these examples into
      # /opt/data/ if the destination files don't exist yet). Mounting them
      # over the in-image versions means our defaults win without needing
      # a custom Dockerfile.
      - ./extensions/services/hermes/cli-config.yaml.template:/opt/hermes/cli-config.yaml.example:ro,z
      # Persona file. The *static* template lives in
      # extensions/services/hermes/SOUL.md.template; an installer step
      # (scripts/build-installation-context.py) renders it into
      # data/persona/SOUL.md with a generated "About this installation"
      # section — what GPU backend, which model, which services are
      # running, which URLs are reachable. So Dream answers truthfully
      # about its own environment instead of inventing capabilities.
      #
      # Why only ONE mount here, not two: Hermes reads the persona at
      # /opt/data/SOUL.md (its HERMES_HOME) at runtime, but its
      # entrypoint copies the in-image /opt/hermes/docker/SOUL.md to
      # /opt/data/SOUL.md ONLY on first start. We used to bind-mount
      # BOTH paths so updates after first start would land, but macOS
      # Docker Desktop's virtiofs layer refuses nested bind-mounts (a
      # file mount inside the /opt/data directory mount) with:
      #
      #   create mountpoint for /opt/data/SOUL.md ... mountpoint "..."
      #   is outside of rootfs
      #
      # So we mount only the non-nested docker/ path here. For updates
      # after first install, the dream-cli's refresh-soul step does
      # `docker exec dream-hermes cp /opt/hermes/docker/SOUL.md
      # /opt/data/SOUL.md` — same source, container-side copy, works
      # uniformly on Linux + macOS (colima AND Docker Desktop).
      #
      # Why data/persona/ and not data/hermes/: data/hermes/ is owned
      # by uid 10000 (HERMES_UID) — the container's own state lives
      # there. data/persona/ stays operator-owned so the host can
      # regenerate the file without sudo.
      - ./data/persona/SOUL.md:/opt/hermes/docker/SOUL.md:ro,z
    # Hermes is exposed to the LAN via dream-hermes-proxy on port 9120 — that
    # Caddy sidecar forward_auths to dashboard-api's verify-session and only
    # then forwards traffic here. By NOT binding a host port on the Hermes
    # container itself, we close the door on direct LAN access that would
    # bypass the magic-link gate. If you disable the proxy, you'll need to
    # re-add a `ports:` binding here OR `docker exec dream-hermes` to interact.
    #
    # Internal port 9119 stays reachable from other containers (the proxy
    # forwards to dream-hermes:9119 via the Docker network).
    expose:
      - "9119"
    # Run the gateway with the dashboard embedded.
    #
    # Why `gateway run` and not just `dashboard`: Hermes's scheduler (the
    # cron tick that fires recurring tasks) runs INSIDE the gateway process,
    # not the dashboard. Earlier drafts of this extension ran only
    # `dashboard`, which let users create cron jobs through the UI but
    # never actually fired them — `tick()` lives in the gateway's main
    # loop. `gateway run` with HERMES_DASHBOARD=1 (set above) gives us
    # both: the gateway's scheduler + the React UI, in one process.
    #
    # We don't enable any messaging platforms (Telegram / Discord / etc.)
    # so the gateway has no adapters to drive — its only job here is to
    # tick cron and host the dashboard. That's the upstream-supported
    # shape; see https://hermes-agent.nousresearch.com/docs/gateway.
    command:
      - gateway
      - run
    healthcheck:
      # /api/health does not exist in the pinned upstream image, and most
      # /api/* routes are session-token gated. /api/status is explicitly
      # public, read-only, and JSON-backed, so use it for container health.
      test: ["CMD", "curl", "-fs", "http://127.0.0.1:9119/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # skills sync + config bootstrap can take a while
    # Hermes pulls in playwright + ffmpeg + chromium + ML deps — image is
    # multi-GB. Reasonable resource caps so it doesn't crowd out the LLM.
    deploy:
      resources:
        limits:
          cpus: '${HERMES_CPU_LIMIT:-1.0}'
          memory: 4G
        reservations:
          cpus: '${HERMES_CPU_RESERVATION:-0.5}'
          memory: 1G
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
